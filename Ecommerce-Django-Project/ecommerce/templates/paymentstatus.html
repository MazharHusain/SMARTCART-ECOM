<!DOCTYPE html>
<html>

<head>

<title>Payment Status</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

<style>

body{
background:#f4f7f6;
font-family:Arial;
}

.card{
margin-top:120px;
padding:40px;
text-align:center;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.success{
color:green;
font-size:28px;
font-weight:bold;
}

.fail{
color:red;
font-size:28px;
font-weight:bold;
}

.info{
font-size:18px;
margin-top:10px;
}

.btn-shop{
margin-top:20px;
background:#00b712;
color:white;
padding:10px 25px;
border-radius:10px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Payment Status</h2>

{% if status == "Payment Successful" %}

<p class="success">ORDER SUCCESS</p>

<p class="info"><b>Order ID:</b> {{order_id}}</p>

<p class="info"><b>Payment ID:</b> {{payment_id}}</p>

<p class="info">Your order has been placed successfully.</p>

<a class="btn-shop" href="/">Continue Shopping</a>

{% else %}

<p class="fail">ORDER FAILURE</p>

<p>Your payment failed or was cancelled.</p>

<a class="btn-shop" href="/checkout">Try Again</a>

{% endif %}

</div>

</div>

</body>

</html>
